<!DOCTYPE html>
<html>  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Jenga Die</title>
    <style>
        h1 {
            color : #030303;
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-weight: lighter;
        }

        .dbox {
            width: 60%;
            max-width: 420px;
            margin: 0 auto;
            background-color: #425e46;
            border: 10px solid #4a2c17;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);

        }

        .tray {
            background-color: #2d4a2d;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border: 3px inset #1a2e1a;
        }

        .histpaper {
            position: relative;
            overflow: visible;
            margin-top: 30px;
            background-color: #f5f5dc;
            border: 2px solid #e9e9e95c;
            color: #292020;
            font-weight: bold;
            border-radius: 8px;
            padding: 16px;
            width: 60%;
            max-width: 400px;
            height: 500px;
            margin-left: auto;
            margin-right: auto;
        }


        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-align: center;
            margin-top: 50px;
            background-color: rgb(138, 108, 90);
            color: #8e7e65;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: bisque;
            cursor: pointer;
        }
        .dieBtn a p{
            display: none;
        }

        .dieBtn a:hover p{display: block;}

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }


        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .pop {
            animation: pop 0.4s ease-out;
            transform-origin: center;
            transform-box: fill-box;
        }

        @keyframes idle {
            0% {transform: scale(1);}
            50% {transform: scale(1.05);}
            100% {transform: scale(1);}
        }
        .idle {
            animation: idle 2s ease-in-out infinite;
        }

        .dice {
            width: 100%;
            max-width: 160px;
            height: auto; 
            }   

    </style>
</head>

<body>
    
    <div class="dbox">
    <h1> Simple Jenga Dice (3-sided Die Homebrew) </h1>
    <div class="tray">
        <svg class="dice" viewBox="0 0 160 160" id="number"> 
            <polygon points="80,12 152,140 8,140" fill="#2302f5" stroke="#333" stroke-width="2"/>
            <text x="80" y="100" font-size="50" text-anchor="middle" fill="#333" id="numberdie">?</text>
        </svg>

        <svg class="dice" viewBox="0 0 160 160" id="alphabet"> 
            <polygon points="80,12 152,140 8,140" fill="#f00a0a" stroke="#333" stroke-width="2"/>
            <text x="80" y="100" font-size="50" text-anchor="middle" fill="#333" id="alphabetdie">?</text>
        </svg>
        </div>
    

    <br>
    <div  class="dieBtn">
        <button id="rBtn" class="idle" onclick="rollDie()" title="Feeling Lucky? :3">Roll the Jenga Die</button>
        <br>
        <button onclick="clearHistory()" title="Want to start over?">Clear History</button>
    </div>
    </div>
    <div class="histpaper">
        <p> Roll History</p>
        <ul id="histlist">
        </ul>

    </div>

    
</body>
<script>
let rollCount = 0;

function rollDie() {
    
    const btn = document.getElementById('rBtn');
    btn.classList.remove('idle');
    const index = Math.floor(Math.random() * 3);
    const num = index + 1;
    const letter = ['A', 'B', 'C'][index];
    const numEl= document.getElementById('numberdie');
    const letterEl = document.getElementById('alphabetdie');

    


    numEl.classList.remove('pop');
    letterEl.classList.remove('pop');
    
    void numEl.offsetWidth;
    void letterEl.offsetWidth;

    
    numEl.textContent = num;
    letterEl.textContent = letter;

    rollCount++;
    if (document.getElementById('histlist').children.length >= 10) {
        document.getElementById('histlist').firstChild.remove();
    }
    const entry = document.createElement('li');
    entry.textContent = `Roll ${rollCount}: ${letter}${num}`;
    document.getElementById('histlist').appendChild(entry);

    numEl.classList.add('pop');
    letterEl.classList.add('pop');
    setTimeout(() => {
    btn.classList.add('idle');
    }, 400);
}

function clearHistory() {
    document.getElementById('histlist').innerHTML = '';
    rollCount = 0;
}

</script>
</html>
