<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller for Games</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #2f3132fe;
            --fg: #f0f0f0;
            --accent: #688ccd;
            
        }

        body {
            mine-height: 100vh;
            display: flex;
            background: var(--bg);
            color: var(--fg);
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
            animation: pulse 5s infinite;
        }

        .stage {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        .tit {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: clamp(1.3rem, 5vw, 2rem);
            color: #fd4a4ab5;
            letter-spacing: .14em;
            text-shadow: 0 0 25px #c9933a, 0 2px 0 #0005;

        }

        .head {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: .7em;
            letter-spacing: .4em;
            color:#b7b597;
            text-transform: uppercase;
            margin-top: .3rem
        }

        .die_pa {
            display: flex;
            gap: 2.5rem;
            align-items: flex-end;
            justify-content: center;
        }

        .die_co {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .die_co-la {
            font-size: .70rem;
            letter-spacing: .35em;
            text-transform: uppercase;
        }

        .divi {
            width: 1.5px;
            height: 110px;
            background: linear-gradient(to bottom, transparent, #0047AB, transparent);
            opacity: .2;
            align-self: center;
        }

        .die_wr {
            position: relative;
            width: 140px;
            height: 140px;
            cursor: pointer;
            transition: filter .2s, transform .1s;
        }
        .die_wr.yellow-die { filter :drop-shadow(0 0 16px  #e5fa08dc)}
        .die_wr.yellow-die:hover { filter :drop-shadow(0 0 28px  #edf694dc)}
        .die_wr:active {transform: scale(.95);}

        .die-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        /* Dice 1*/

        .mf-out{
            fill: #1e1206; stroke: #e5fa08dc; stroke-width: 2.5;
        }
        .mf-in {
            fill: #120c04; stroke: #e5fa08dc; stroke-width: 1.2; opacity: .55;
        }
        .mf-sh {
            fill: url(#shineG); opacity: .18;
        }

        .mf-ed {
            fill: none; stroke: #e5fa08dc; stroke-width: 1; opacity: .35;
        }
        /* Dice 2*/

        .sf-out {
            fill: #06101e; stroke: #4a8acc; stroke-width: 2.5;
        }

        .sf-in {
            fill: #040a12; stroke: #4a8acc; stroke-width: 1.2; opacity: .55;
        }

        .sf-sh {
            fill: url(#shineB); opacity: .18;
        }

        .sf-ed {
            fill: none; stroke: #688ccd; stroke-width: 1; opacity: .35;
        }


        .die-nm {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 2.5rem;
            text-anchor: middle;
            dominant-baseline: central;
            transition: opacity .15s;
            fill: #c9933a;
            filter: url(#glowG);}
        .die-nm.a {fill: #e5fa08dc; filter: url(#glowY);}
        .die-nm.b {fill: #688ccd; filter: url(#glowB);}
        .die-nm.hidden { opacity: 0; }
        
        .btn { 
            background: none; border: none;
            cursor: pointer; padding: 0; outline: none;
        }

        .btn-in {

        }
        .btn:active .btn-in {
            transform: translateY(2px);
        }

        .btn.g .btn-in {
            background: #e5fa08dc;
            border: 1.5px solid #e5fa08dc;
            color: #e5fa08dc;
            box-shadow: 0 0 10px #c9933a inset;
        }

        .pip {
        width: 24px; height: 24px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: .68rem;
        opacity: 0; transform: scale(.4);
        animation: popIn .35s forwards;
        }
        .pip.gold { border: 1.5px solid var(--gold); color: var(--gold-lt); background: #1a0e04; }
        .pip.blue { border: 1.5px solid #4a8acc;    color: #80c8ff;       background: #04090f; }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }
    
        /* ── Animations ── */
        @keyframes shake {
        0%  { transform: rotate(0deg)   scale(1); }
        20% { transform: rotate(-12deg) scale(1.08); }
        40% { transform: rotate(10deg)  scale(1.05); }
        60% { transform: rotate(-8deg)  scale(1.08); }
        80% { transform: rotate(6deg)   scale(1.04); }
        100%{ transform: rotate(0deg)   scale(1); }
        }
        .dice-wr.rolling { animation: shake .45s ease-in-out; }
    
        @keyframes numPop {
        0%  { transform: scale(0) rotate(-30deg); opacity:0; }
        70% { transform: scale(1.2) rotate(4deg); opacity:1; }
        100%{ transform: scale(1) rotate(0deg);   opacity:1; }
        }
        .dice-nm.popping { animation: numPop .4s ease-out forwards; }
    </style>
</head>
<body>
    <div class="stage">
        <div class = "tit"> Jenga </div>
        <div class = "head"> Dice Roller (3 Dice)</div>
    </div>
    <div class="die_pa">
        <div class="die_co">
            <div class="die_co-la">Numeric Die</div>
            <button class="btn die_wr yellow-die" id="die1">
                <svg viewBox="0 0 100 100" class="die-svg">
                    <defs>
                        <radialGradient id="shineG" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#fff" stop-opacity="1" />
                            <stop offset="100%" stop-color="#fff" stop-opacity="0" />
                        </radialGradient>
                        <filter id="glowY" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#e5fa08dc"/>
                        </filter>
                    </defs>
                    <polygon class="mf-out" points=""80, 12 152, 140 8, 140"/>
                    <polygon class="mf-in" points="80, 36 134, 128 26, 128"/>
                    <polygon class="mf-sh" points="80, 14 150, 138 10, 138"/>
                    <polygon class="mf-ed" points="80, 12 150,138 10, 138"/>
                    <circle cx="80" cy="20" r="3.5" fill="#e5fa08dc" opacity=".7"/>
                    <circle cx="148" cy="140" r="3.5" fill="#e5fa08dc" opacity=".7"/>
                    <circle cx="12" cy="140" r="3.5" fill="#e5fa08dc" opacity=".7"/>
                    <text class="die-nm hidden a" id="num2" x="80" y="95">-</text>
                </svg>
            </div>
            <div class=""divi"></div>
            
            <div class="die_co">
                <div class ="die_co-la">Alphabetic Die</div>
                <div class="die_wr" id="die2">
                    <svg viewBox="0 0 100 100" class="die-svg">
                        <defs>
                            <radialGradient id="shineB" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#fff" stop-opacity="1" />
                                <stop offset="100%" stop-color="#fff" stop-opacity="0" />
                            </radialGradient>
                            <filter id="glowB" x="-50%" y="-50%" width="200%" height="200%">
                                <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#688ccd"/>
                            </filter>
                        </defs>
                        <polygon class="sf-out" points="80, 12 152, 140 8, 140"/>
                        <polygon class="sf-in" points="80, 36 134, 128 26, 128"/>
                        <polygon class="sf-sh" points="80, 14 150, 138 10, 138"/>
                        <polygon class="sf-ed" points="80, 12 150,138 10, 138"/>
                        <text class="die-nm hidden b" id="num1" x="80" y="95">-</text>
                    </svg>
                </div>
            </div>

    </div>

    <div class="btn">
            <div class="die_wr g" id="rollBtn">
                <div class="btn-in">Roll</div>
            </div>
    </div>


    <script>
        const ALP = ['A', 'B', 'C'];
        const NUM = [1, 2, 3];
        let busy1 = false, busy2 = false;

        function rollDie(wrap, numEl, isAlo, color, onDone ) {
            wrap.classList.add('rolling');
            numEl.classList.add('popping', 'hidden');
            void wrap.offsetWidth; // Trigger reflow for animation restart
            wrap.classList.add('rolling');
            numEl.classList.remove('hidden');
            setTimeout(() => {
                const result = isAlo ? ALP[Math.floor(Math.random() * ALP.length)] : NUM[Math.floor(Math.random() * NUM.length)];
                numEl.textContent = result;
                wrap.classList.remove('rolling');
                numEl.classList.remove('popping');
                onDone(result);
            }, 450);
        }

        const wrap1 = document.getElementById('wrap1'), num1 = document.getElementById('num1'),
              wrap2 = document.getElementById('wrap2'), num2 = document.getElementById('num2'),
              rollBtn = document.getElementById('rollBtn');

        function doRoll1() {
                if (busy1) return;
                busy1 = true;
                rollDie(wrap1, num1, true, 'blue', () => busy1 = false);
              }

        function doRoll2() {
                    if (busy2) return;
                    busy2 = true;
                    rollDie(wrap2, num2, false, 'gold', () => busy2 = false);
                }

        document.getElementById('die1').addEventListener('click', doRoll1);
        wrap1.addEventListener('click', doRoll1);
        document.getElementById('die2').addEventListener('click', doRoll2);
        wrap2.addEventListener('click', doRoll2);
        document.getElementById('rollBtn').addEventListener('click', () => {
            doRoll1();
            doRoll2();
        });
    </script>
</body>
</html>
